# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: ko-KR

early_access: false

reviews:
  # 리뷰 스타일: chill, assertive, nitpicky
  profile: assertive

  # 리뷰 요청 설정
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"

  # 자동 리뷰
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  # 리뷰 제외 경로
  path_filters:
    - "!**/*.lock"
    - "!**/gradle/wrapper/**"
    - "!**/gradlew"
    - "!**/gradlew.bat"
    - "!**/build/**"
    - "!**/out/**"
    - "!**/.gradle/**"
    - "!**/.idea/**"
    - "!**/bin/**"
    - "!**/*.jar"
    - "!**/*.class"

  # 리뷰 도구 설정
  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true

  # 경로별 리뷰 지침
  path_instructions:
    - path: "**/*"
      instructions: |
        ## 🌏 언어 설정 (CRITICAL)
        모든 리뷰 코멘트는 **반드시 한국어로 작성**해야 합니다.

        ## 커밋 컨벤션
        - 타입: feat/fix/refactor/test/docs/chore
        - 구조적 변경(refactor)과 동작적 변경(feat/fix)은 반드시 분리
        - TDD 원칙 준수: Red → Green → Refactor

        ## 코드 품질 원칙
        - 중복 제거 (DRY 원칙)
        - 명확한 네이밍으로 의도 표현
        - 메서드는 단일 책임만 가짐
        - 상태와 부수효과 최소화

    - path: "**/*.kt"
      instructions: |
        ## Kotlin 코드 스타일
        - 들여쓰기: 4 spaces (Kotlin 표준)
        - 네이밍: camelCase (함수, 변수), PascalCase (클래스, 인터페이스)
        - 최대 라인 길이: 120자
        - nullable 타입 사용 시 safe call (?.) 또는 Elvis operator (?:) 활용
        - when 표현식 사용 권장 (if-else 체인 대신)
        - data class 적극 활용
        - companion object는 클래스 맨 아래 위치
        - 확장 함수로 가독성 향상 가능한 경우 제안

        ## Kotlin 관용구
        - `apply`, `let`, `run`, `with`, `also` 스코프 함수 적절히 사용
        - immutable 선호 (val > var, List > MutableList)
        - 람다 표현식 간결하게 작성
        - destructuring 선언 활용

    - path: "src/main/kotlin/**/controller/**/*.kt"
      instructions: |
        ## Controller 리뷰 지침
        - Controller는 thin하게 유지 (비즈니스 로직 없음)
        - 비즈니스 로직은 Service로 분리
        - `@RestController` + `@RequestMapping` 사용
        - HTTP 메서드 명시적 매핑 (`@GetMapping`, `@PostMapping` 등)
        - 요청/응답 DTO 사용 (Entity 직접 노출 금지)
        - `@Valid`로 입력 검증
        - ResponseEntity로 명시적 HTTP 상태 반환
        - 예외 처리는 `@RestControllerAdvice`로 중앙 집중화

    - path: "src/main/kotlin/**/service/**/*.kt"
      instructions: |
        ## Service 리뷰 지침
        - 단일 책임 원칙 (SRP) 준수
        - `@Service` 또는 `@Component` 명시
        - 트랜잭션 처리: `@Transactional` 적절히 사용
        - 읽기 전용 트랜잭션: `@Transactional(readOnly = true)`
        - 복잡한 쿼리는 Repository로 위임
        - 도메인 로직은 Entity로 이동 고려
        - Result 패턴 또는 sealed class로 결과 표현 권장
        - null 반환보다 Optional 또는 nullable 타입 사용

    - path: "src/main/kotlin/**/repository/**/*.kt"
      instructions: |
        ## Repository 리뷰 지침
        - Spring Data JPA 인터페이스 활용
        - 커스텀 쿼리 메서드 네이밍 컨벤션 준수
        - N+1 문제 방지: `@EntityGraph`, JOIN FETCH 사용
        - 복잡한 쿼리는 `@Query` 또는 QueryDSL 사용
        - Projection 활용으로 필요한 데이터만 조회
        - 페이징 처리: `Pageable`, `Page<T>` 사용

    - path: "src/main/kotlin/**/domain/**/*.kt"
      instructions: |
        ## Domain/Entity 리뷰 지침
        - `@Entity` 클래스는 allOpen 플러그인으로 자동 open 처리됨
        - ID는 `@Id` + `@GeneratedValue` 명시
        - 불변성 유지: `val` 사용, setter 최소화
        - 비즈니스 로직을 Entity 메서드로 캡슐화
        - 연관관계 매핑 시 양방향은 신중히 (단방향 선호)
        - Lazy Loading 기본 사용
        - `equals()`, `hashCode()` 올바르게 구현
        - `toString()`에서 연관 엔티티 제외 (순환 참조 방지)

    - path: "src/main/kotlin/**/dto/**/*.kt"
      instructions: |
        ## DTO 리뷰 지침
        - data class 사용
        - immutable 유지 (val 사용)
        - validation 어노테이션 적절히 사용 (`@NotNull`, `@NotBlank` 등)
        - Entity와 DTO 분리 (직접 노출 금지)
        - 매핑 로직은 확장 함수 또는 Mapper 클래스로 분리

    - path: "src/main/kotlin/**/config/**/*.kt"
      instructions: |
        ## Configuration 리뷰 지침
        - `@Configuration` 명시
        - Bean 등록은 `@Bean` 메서드로
        - 설정 값은 `@Value` 또는 `@ConfigurationProperties` 사용
        - 환경별 설정 분리 (`@Profile` 활용)
        - Security 설정은 명시적으로 작성
        - CORS, Filter 설정 주의 깊게 검토

    - path: "src/test/kotlin/**/*.kt"
      instructions: |
        ## 테스트 리뷰 지침
        - TDD 워크플로우 (Red-Green-Refactor) 준수
        - JUnit 5 사용 (`@Test`, `@BeforeEach`, `@AfterEach`)
        - 테스트 메서드명: 한글 또는 백틱 사용 가능 (`fun `유저 생성 시 이메일은 필수다`()`)
        - Given-When-Then 패턴 명시
        - 단위 테스트: 외부 의존성 Mocking (`@MockBean`, MockK)
        - 통합 테스트: `@SpringBootTest` 사용
        - 테스트 독립성 보장 (순서 의존 금지)
        - `@Transactional`로 테스트 후 롤백
        - AssertJ 또는 Kotest Assertion 사용 권장
        - 테스트 커버리지 50% 이상 유지

    - path: "build.gradle.kts"
      instructions: |
        ## Gradle 빌드 스크립트 리뷰 지침
        - Kotlin DSL 사용
        - 의존성 버전 명시적 관리 (BOM 활용)
        - 불필요한 의존성 제거
        - 플러그인 버전 최신화
        - 테스트 설정 확인 (JUnit Platform)
        - JaCoCo, Detekt 등 품질 도구 통합

    - path: "src/main/resources/**/*.properties"
      instructions: |
        ## Properties/YAML 리뷰 지침
        - 민감 정보 (DB password, API key 등) 환경변수 또는 Secret 사용
        - 환경별 설정 분리 (`application-dev.properties`, `application-prod.properties`)
        - 명확한 프로퍼티 네이밍
        - 주석으로 설정 의도 명시

    - path: "src/main/resources/**/*.yml"
      instructions: |
        ## Properties/YAML 리뷰 지침
        - 민감 정보 (DB password, API key 등) 환경변수 또는 Secret 사용
        - 환경별 설정 분리 (`application-dev.yml`, `application-prod.yml`)
        - YAML 계층 구조 명확하게 작성
        - 들여쓰기: 2 spaces

    - path: ".github/workflows/**/*.yml"
      instructions: |
        ## GitHub Actions 워크플로우 리뷰 지침
        - Job 이름 명확하게 작성
        - 필요한 권한만 부여
        - 시크릿 안전하게 사용
        - 캐싱으로 빌드 시간 최적화
        - 실패 시 알림 설정 고려

chat:
  auto_reply: true
